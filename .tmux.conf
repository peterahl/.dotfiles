set -g mouse on
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-window-option -g window-status-current-style bg=red

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# vim keybindings for resizing panes
bind-key C-H resize-pane -L 5
bind-key C-J resize-pane -D 5
bind-key C-K resize-pane -U 5
bind-key C-L resize-pane -R 5

# vim keybindings for splitting panes
bind-key C-v split-window -h -c "#{pane_current_path}"
bind-key C-s split-window -v -c "#{pane_current_path}"

# toggle status bar
bind-key C-b set-option -g status


# Switch to or create named sessions using M-[1-6] keys with tmuxp
bind-key -n M-1 if-shell "tmux has-session -t m1" "switch-client -t m1" "run-shell 'tmuxp load -y ~/.config/tmuxp/m1.yaml > /dev/null'"
bind-key -n M-2 if-shell "tmux has-session -t m2" "switch-client -t m2" "run-shell 'tmuxp load -y ~/.config/tmuxp/m2.yaml > /dev/null'"
bind-key -n M-3 if-shell "tmux has-session -t m3" "switch-client -t m3" "run-shell 'tmuxp load -y ~/.config/tmuxp/m3.yaml > /dev/null'"
bind-key -n M-4 if-shell "tmux has-session -t m4" "switch-client -t m4" "run-shell 'tmuxp load -y ~/.config/tmuxp/m4.yaml > /dev/null'"
bind-key -n M-5 if-shell "tmux has-session -t m5" "switch-client -t m5" "run-shell 'tmuxp load -y ~/.config/tmuxp/m5.yaml > /dev/null'"
bind-key -n M-6 if-shell "tmux has-session -t m6" "switch-client -t m6" "run-shell 'tmuxp load -y ~/.config/tmuxp/m6.yaml > /dev/null'"
bind-key -n M-7 if-shell "tmux has-session -t m7" "switch-client -t m7" "run-shell 'tmuxp load -y ~/.config/tmuxp/m7.yaml > /dev/null'"
bind-key -n M-8 if-shell "tmux has-session -t m8" "switch-client -t m8" "run-shell 'tmuxp load -y ~/.config/tmuxp/m8.yaml > /dev/null'"
bind-key -n M-8 if-shell "tmux has-session -t m9" "switch-client -t m9" "run-shell 'tmuxp load -y ~/.config/tmuxp/m9.yaml > /dev/null'"

bind -n M-t run-shell "toggle_tmux_pane"

bind-key -n M-f if-shell -F "#{window_zoomed_flag}" "resize-pane -Z" "resize-pane -Z"

# prefix C-c to create new window
bind-key C-c new-window


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-f"
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'niksingh710/minimal-tmux-status'

bind r source ~/.tmux.conf\; display "~/.tmux.conf sourced!"

run '~/.tmux/plugins/tpm/tpm'

bind-key -r G run-shell "/home/peter/.local/share/nvim-lazy/lazy/harpoon/scripts/tmux/switch-back-to-nvim"

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
